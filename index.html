<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickers & Pins</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --accent: #000000;
            --gray: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin: 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        header p {
            color: #666;
        }

        /* Category Navigation */
        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .cat-btn {
            background: none;
            border: 1px solid var(--accent);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .cat-btn.active, .cat-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        /* Product Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .product-card {
            border: 1px solid var(--gray);
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-img {
            width: 100%;
            height: 200px;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            margin-bottom: 15px;
            border-radius: 4px;
            object-fit: cover;
        }

        .product-title {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .product-price {
            font-weight: bold;
            color: #444;
            margin-bottom: 15px;
        }

        .add-to-cart {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        /* Cart UI */
        .cart-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s right ease;
            z-index: 100;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gray);
            padding-bottom: 10px;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--gray);
        }

        /* Form Styling */
        .order-form {
            margin-top: 20px;
            border-top: 1px solid var(--gray);
            padding-top: 20px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--gray);
            border-radius: 4px;
        }

        .submit-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Stickers & Pins.</h1>
        <p>No deep meaning, just cool designs.</p>
    </header>

    <div class="categories">
        <button class="cat-btn active" onclick="filterCategory('all')">Show All</button>
        <button class="cat-btn" onclick="filterCategory('stickers')">Stickers Only</button>
        <button class="cat-btn" onclick="filterCategory('pins')">Pins Only</button>
    </div>

    <main class="products-grid" id="products-container"></main>

    <button class="cart-toggle" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Order</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        
        <div class="cart-items" id="cart-items-list">
            </div>

        <div class="cart-total" style="font-weight: bold; margin: 15px 0;">
            Total: $<span id="cart-total-price">0.00</span> (Pay at Pick Up)
        </div>

        <form class="order-form" action="https://formspree.io/f/YOUR_FORMSPREE_FORM_ID" method="POST" onsubmit="prepareOrderData(event)">
            <input type="hidden" id="hidden-order-details" name="Order Details">
            <input type="hidden" id="hidden-total" name="Total Price">
            
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="Name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="contact">Phone or Instagram Handle</label>
                <input type="text" id="contact" name="Contact Info" required placeholder="@yourhandle or phone #">
            </div>
            <div class="form-group">
                <label for="notes">Pick Up / Delivery Notes</label>
                <textarea id="notes" name="Notes" rows="2" placeholder="When or where do you want to pick up?"></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit Order</button>
        </form>
    </div>

    <script>
        // --- ADD YOUR PRODUCTS HERE ---
        const products = [
            { id: 1, name: "Cool Frog Sticker", category: "stickers", price: 3.00, img: "https://via.placeholder.com/200" },
            { id: 2, name: "Neon Space Pin", category: "pins", price: 8.00, img: "https://via.placeholder.com/200" },
            { id: 3, name: "Holographic Cat Sticker", category: "stickers", price: 3.50, img: "https://via.placeholder.com/200" },
            { id: 4, name: "Retro Game Pin", category: "pins", price: 9.00, img: "https://via.placeholder.com/200" }
        ];

        let cart = [];

        // Render Products
        function renderProducts(filter = 'all') {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            
            filtered.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img class="product-img" src="${p.img}" alt="${p.name}">
                        <div>
                            <h3 class="product-title">${p.name}</h3>
                            <p class="product-price">$${p.price.toFixed(2)}</p>
                        </div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">Add to Cart</button>
                    </div>
                `;
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat);
        }

        // Cart Actions
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exists = cart.find(item => item.id === id);
            
            if (exists) {
                exists.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items-list');
            const count = document.getElementById('cart-count');
            const totalSpan = document.getElementById('cart-total-price');
            
            list.innerHTML = '';
            let total = 0;
            let itemCount = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                itemCount += item.quantity;
                list.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            $${item.price.toFixed(2)} x ${item.quantity}
                        </div>
                        <button onclick="removeFromCart(${item.id})" style="background:none; border:none; color:red; cursor:pointer;">Remove</button>
                    </div>
                `;
            });

            count.innerText = itemCount;
            totalSpan.innerText = total.toFixed(2);
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCart();
        }

        // Prepare data right before sending email
        function prepareOrderData(e) {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                e.preventDefault();
                return;
            }

            let orderText = cart.map(item => `${item.name} (Qty: ${item.quantity}) - $${(item.price * item.quantity).toFixed(2)}`).join('\n');
            let totalVal = document.getElementById('cart-total-price').innerText;

            document.getElementById('hidden-order-details').value = orderText;
            document.getElementById('hidden-total').value = "$" + totalVal;
        }

        // Initialize
        renderProducts();
    </script>
</body>
</html>
